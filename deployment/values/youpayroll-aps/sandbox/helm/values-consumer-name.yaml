# WARNING: This is a template configuration file for background consumers.
# Replace all instances of 'consumer-name' with the actual consumer name (e.g. 'zoho-sync-worker') during deployment.
# Replace [MANAGEMENT_COMMAND] with an existing Django management command for the consumer.
namespace: 'youpayroll-aps'

app_name: 'youpayroll-aps'
environment: 'sandbox'
type: 'consumer-name'

service:
  name: 'youpayroll-aps-consumer-name'
  default:
    port: 8000
    protocol: 'TCP'
    targetPort: 8000

hpa:
  name: 'youpayroll-aps-consumer-name-hpa'
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 80

pdb:
  name: 'youpayroll-aps-consumer-name-pdb'
  minAvailable: 50%

deployment:
  name: 'youpayroll-aps-consumer-name-deployment'
  replicas: 1
  maxSurge: 100%
  maxUnavailable: 0%
  serviceAccountName: 'ygag-youpayroll-aps-vault'

  containers:
    default:
      name: 'consumer-name'
      imagePullPolicy: 'Always'
      image: '459037613883.dkr.ecr.ap-south-1.amazonaws.com/production/ygag/youpayroll-aps/backend-app:[BUILD_TAG]'
      command: '["sh", "-c", ". /vault/secrets/application.env ; . /vault/secrets/application-devops.env ; python3.11 manage.py [MANAGEMENT_COMMAND] >> /ygag/logs/app.out.consumer-name.log 2>&1"]'
      env:
        - name: 'DJANGO_SETTINGS_MODULE'
          value: 'youpayroll.settings.sandbox'
      memory:
        requests: 300Mi
        limits: 400Mi
      cpu:
        requests: 150m
      volumeMounts:
        - mountPath: '/ygag/logs/'
          name: 'ygag-youpayroll-aps-sandbox-consumer-name-logs'
        - name: 'youpayroll-aps-app-env-volume'
          mountPath: "/vault/secrets"


  volumes:
    - name: 'ygag-youpayroll-aps-sandbox-consumer-name-logs'
      hostPath:
        path: '/home/ec2-user/ygag-logs/ygag-youpayroll-aps-sandbox/consumer'
    - name: 'youpayroll-aps-app-env-volume'
      csi:
        driver: secrets-store.csi.k8s.io
        readOnly: true
        volumeAttributes:
          secretProviderClass: "youpayroll-aps-envs"

  nodeSelector:
    key: 'karpenter.sh/nodepool'
    value: 'default'

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: 'topology.kubernetes.io/zone'
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app: 'youpayroll-aps'
          tier: consumer-name

  priorityClassName: 'sandbox-medium'
  terminationGracePeriodSeconds: 60
